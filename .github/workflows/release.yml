---
name: Release

"on":
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release (stable, beta, nightly)"
        required: true
        default: "beta"
        type: choice
        options:
          - stable
          - beta
          - nightly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release
  cancel-in-progress: true

jobs:
  versioning:
    name: Determine Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
      release_body: ${{ steps.get_version.outputs.release_body }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Calculate Version and Release Details
        id: get_version
        shell: bash
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/calculate_release_details.py

      - name: Upload Release Body
        uses: actions/upload-artifact@v7
        with:
          name: release-body
          path: release_body.md

      - name: Prepare Initial Draft Body
        shell: bash
        run: |
          body=$(cat release_body.md)
          printf "%s\n\n---\n🔄 **Release Progress**: Version determined. Syncing repository files...\n" "$body" > initial_draft_body.md

      - name: Check and Delete Existing Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.get_version.outputs.tag }}
          VERSION: ${{ steps.get_version.outputs.version }}
        shell: bash
        run: |
          # Use gh api to find existing draft release
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'" or .name=="Release '$VERSION'") | select(.draft==true) | .id')
          if [ -n "$release_id" ]; then
            gh api -X DELETE "repos/$REPO/releases/$release_id"
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

      - name: Create Initial Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.version }}
          body_path: initial_draft_body.md
          prerelease: ${{ steps.get_version.outputs.is_prerelease == 'true' }}
          draft: true
          generate_release_notes: false

  sync-version:
    name: Sync Repository Version
    needs: versioning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Configure Git and pull latest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }}

      - name: Update Files
        shell: bash
        run: |
          python .github/scripts/version_manager.py bump --type ${{ inputs.release_type }}

      - name: Commit and Push
        run: |
          git add custom_components/db_infoscreen/manifest.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: release version ${{ needs.versioning.outputs.version }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || (git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }})
          fi

      - name: Download Release Body
        uses: actions/download-artifact@v8
        with:
          name: release-body

      - name: Update Draft Status (Zipping Integration)
        shell: bash
        run: |
          body=$(cat release_body.md)
          printf "%s\n\n---\n🔄 **Release Progress**: Repository version synced. Creating release assets...\n" "$body" > updated_draft_body.md

      - name: Update Draft Release on GitHub
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.versioning.outputs.tag }}
          name: Release ${{ needs.versioning.outputs.version }}
          body_path: updated_draft_body.md
          prerelease: ${{ needs.versioning.outputs.is_prerelease == 'true' }}
          draft: true
          generate_release_notes: false

  gh-release:
    needs: [versioning, sync-version]
    if: always() && needs.versioning.result == 'success' && needs.sync-version.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 📦 Zip Component
        run: |
          cd custom_components
          zip -r ../db_infoscreen.zip db_infoscreen
          cd ..

      - name: Download Release Body Artifact
        uses: actions/download-artifact@v8
        with:
          name: release-body

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.versioning.outputs.tag }}
          name: Release ${{ needs.versioning.outputs.version }}
          body_path: release_body.md
          prerelease: ${{ needs.versioning.outputs.is_prerelease == 'true' }}
          draft: false
          generate_release_notes: false
          files: |
            db_infoscreen.zip

  cleanup-release:
    needs: [versioning, sync-version, gh-release]
    if: always() && needs.versioning.result == 'success' && (needs.sync-version.result == 'failure' || needs.gh-release.result == 'failure' || cancelled())
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.versioning.outputs.tag }}
        shell: bash
        run: |
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'") | select(.draft==true) | .id')
          if [ -n "$release_id" ]; then
            gh api -X DELETE "repos/$REPO/releases/$release_id"
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          fi
