name: CI Orchestrator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  workflow_call:
permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  labeler:
    name: Label PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate JSON/YAML
        run: |
          python -c "import json, glob; [json.load(open(f, encoding='utf-8-sig')) for f in glob.glob('**/*.json', recursive=True)]"
          python -c "import yaml, glob; [yaml.safe_load(open(f, encoding='utf-8-sig')) for f in glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True)]"

      - name: Check Integration Structure
        run: |
          test -d custom_components/kadermanager
          test -f custom_components/kadermanager/manifest.json
          test -f hacs.json

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run Mypy
        run: mypy custom_components/kadermanager

      - name: Run Tests
        run: |
          pytest --cov=custom_components.kadermanager --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  hassfest:
    name: Validate with Hassfest
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  hacs-validation:
    name: Validate HACS
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v6
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  auto-merge:
    name: Auto Merge Renovate
    runs-on: ubuntu-latest
    needs: [lint-test, hassfest, hacs-validation, codeql]
    if: github.event_name == 'pull_request' && github.actor == 'renovate[bot]'
    steps:
      - uses: actions/checkout@v6
      - name: Enable Auto Merge
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
