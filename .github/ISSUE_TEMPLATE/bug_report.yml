name: Bug Report
description: Report a bug with the Kadermanager integration
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - FaserF
body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit
        - Search [existing issues](https://github.com/FaserF/ha-kadermanager/issues) to avoid duplicates
        - Read the [documentation](https://github.com/FaserF/ha-kadermanager/blob/master/README.md)
        - Check the integration on your HA instance: [![Open Integration](https://my.home-assistant.io/badges/integration.svg)](https://my.home-assistant.io/redirect/integration/?domain=kadermanager)

  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      description: Which version of the Kadermanager integration are you using?
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: Which version of Home Assistant are you running? [![Open HA Info](https://my.home-assistant.io/badges/info.svg)](https://my.home-assistant.io/redirect/info/)
      placeholder: 2025.6.0
    validations:
      required: true

  - type: dropdown
    id: ha_install_type
    attributes:
      label: Home Assistant Installation Type
      description: How is Home Assistant installed?
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core
    validations:
      required: true

  - type: dropdown
    id: sport_type
    attributes:
      label: Sport Type
      description: Which sport is your team playing?
      options:
        - Football (Fußball)
        - Basketball
        - Handball
        - Volleyball
        - Tennis
        - Other
    validations:
      required: false

  - type: input
    id: team_name
    attributes:
      label: Team / Club Name
      description: Which team or club is affected? (Do not include private information)
      placeholder: e.g. FC Example
    validations:
      required: false

  - type: textarea
    id: bug_description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic Information
      description: |
        Paste diagnostic data here (optional). [![Open Diagnostics](https://my.home-assistant.io/badges/diagnostics.svg)](https://my.home-assistant.io/redirect/diagnostics/)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output here. Enable debug logging for `custom_components.kadermanager` if possible.
      render: shell
    validations:
      required: false
